repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.14.3
  hooks:
    # Run the linter.
    - id: ruff-check
    # Run the formatter.
    - id: ruff-format

- repo: local
  hooks:
  - id: pytest
    name: pytest
    entry: uv
    args: [run, pytest]
    language: python
    types: [python]
    pass_filenames: false
    always_run: true
